name: "JUCE Visage (Codex Skill): Bug Report"
description: Report a bug in the Codex juce-visage skill
labels: ["bug", "juce-visage", "codex-skill"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Ask Codex to do '...'
        2. Codex follows juce-visage guidance
        3. See incorrect behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details.
      placeholder: |
        - OS: macOS 15.x
        - Codex environment/version: x.x.x
        - Model used: gpt-5 / gpt-5-codex
        - Xcode version: x.x
        - JUCE version: x.x.x
        - Visage version: x.x.x
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
